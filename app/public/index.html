<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חיפוש בפרוטוקולים</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --muted-text: #64748b;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 2rem;
            padding: 2rem;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h1 {
            margin-top: 0;
            color: var(--primary-color);
            text-align: center;
        }

        .search-box {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: var(--muted-text);
            cursor: not-allowed;
        }

        #result {
            display: none;
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
        }

        #answer-content {
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .sources-title {
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--muted-text);
        }

        .source-card {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .source-meta {
            font-size: 0.875rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .source-text {
            font-size: 0.9rem;
            color: var(--muted-text);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--muted-text);
            margin: 2rem 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>חיפוש בפרוטוקולים</h1>
        
        <form class="search-box" id="search-form">
            <input type="text" id="question" placeholder="מה תרצה לדעת?" required>
            <button type="submit" id="submit-btn">חפש</button>
        </form>

        <div class="loading" id="loading">מחפש ומייצר תשובה...</div>

        <div id="result">
            <div id="answer-content"></div>
            
            <div class="sources-title">מקורות:</div>
            <div id="sources-container"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('search-form');
        const input = document.getElementById('question');
        const submitBtn = document.getElementById('submit-btn');
        const loading = document.getElementById('loading');
        const resultDiv = document.getElementById('result');
        const answerContent = document.getElementById('answer-content');
        const sourcesContainer = document.getElementById('sources-container');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const question = input.value.trim();
            if (!question) return;

            // UI Loading state
            input.disabled = true;
            submitBtn.disabled = true;
            loading.style.display = 'block';
            resultDiv.style.display = 'none';
            sourcesContainer.innerHTML = '';

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                if (!response.ok) {
                    throw new Error(`שגיאת שרת: ${response.status}`);
                }

                const data = await response.json();
                
                answerContent.textContent = data.answer;
                
                data.source_documents.forEach((doc, index) => {
                    const source = doc.metadata?.source_file || 'לא ידוע';
                    const section = doc.metadata?.section_type || 'לא ידוע';
                    const gcsUrl = doc.metadata?.gcs_url;
                    
                    let sourceHtml = `מקור ${index + 1}: `;
                    if (gcsUrl) {
                        sourceHtml += `<a href="${gcsUrl}" target="_blank" rel="noopener noreferrer">${source}</a>`;
                    } else {
                        sourceHtml += source;
                    }
                    sourceHtml += ` | חלק: ${section}`;
                    
                    const card = document.createElement('div');
                    card.className = 'source-card';
                    card.innerHTML = `
                        <div class="source-meta">${sourceHtml}</div>
                        <div class="source-text">${doc.content}</div>
                    `;
                    sourcesContainer.appendChild(card);
                });

                resultDiv.style.display = 'block';
            } catch (error) {
                alert('אירעה שגיאה: ' + error.message);
            } finally {
                input.disabled = false;
                submitBtn.disabled = false;
                loading.style.display = 'none';
                input.focus();
            }
        });
    </script>
</body>
</html>
